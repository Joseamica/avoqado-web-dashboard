<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="favicon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <link rel="icon" href="/favicon.ico?v=3" sizes="32x32" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Avoqado | Dashboard</title>
    <!-- App init (theme/env) moved to external script for CSP compliance -->
    <script src="/app-init.js"></script>
    <!-- Google tag (gtag.js) — dual-property setup (keeps product and marketing data apart):
         · G-RHVHM6V578 (GA4 "Avoqado", product property 336228296): ALL dashboard usage.
         · G-F6JCDF9K3P (GA4 "Avoqado Web", marketing property 540042836): NOT configured here —
           daily usage sends NOTHING to marketing (not even enhanced-measurement scroll).
           src/lib/gtag.ts configures it just-in-time to fire the sign_up event, the ONE
           event that must land in marketing so ad-driven signups attribute in Google Ads.
         · AW-18201754401 (Google Ads): keeps the dashboard tagged for Ads conversion coverage.
         Cookies are cross-subdomain (.avoqado.io) so a landing ad-click session continues here.
         Skipped entirely on localhost/dev so dev traffic never reaches any property. -->
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() { dataLayer.push(arguments) }
      ;(function () {
        var h = window.location.hostname
        var isLocalDev = h === 'localhost' || h === '127.0.0.1' || h.indexOf('192.168.') === 0 || /\.local$/.test(h)
        if (isLocalDev) return
        gtag('consent', 'default', {
          ad_storage: 'granted', ad_user_data: 'granted', ad_personalization: 'granted',
          analytics_storage: 'granted', functionality_storage: 'granted', security_storage: 'granted',
        })
        gtag('js', new Date())
        gtag('config', 'G-RHVHM6V578')
        gtag('config', 'AW-18201754401')
        var s = document.createElement('script')
        s.async = true
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-RHVHM6V578'
        document.head.appendChild(s)
      })()
    </script>
    <!-- Geist (variable) + Geist Mono for Sidebar; Inter (variable) for content -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <script>
      ;(function () {
        // Theme detection
        const storageKey = 'vite-ui-theme'
        const getSystemTheme = () => (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        const setting = localStorage.getItem(storageKey) || 'system'
        const theme = setting === 'system' ? getSystemTheme() : setting
        if (theme === 'dark') document.documentElement.classList.add('dark')

        // Environment detection and favicon/title setting
        const hostname = window.location.hostname
        const pathname = window.location.pathname
        const isLocal =
          hostname === 'localhost' || hostname === '127.0.0.1' || hostname.startsWith('192.168.') || hostname.endsWith('.local')
        const isStaging = hostname.includes('staging') || hostname.includes('develop')
        const isSuperadminRoute = pathname.startsWith('/superadmin')
        const favicon = document.getElementById('favicon')
        const pageTitle = document.getElementById('page-title')
        let baseFaviconHref = '/favicon.svg?v=3'

        if (isLocal) {
          baseFaviconHref = '/favicon-development.svg'
          pageTitle.textContent = 'Avoqado | Dashboard (DEV)'
          document.documentElement.setAttribute('data-env', 'development')
        } else if (isStaging) {
          baseFaviconHref = '/favicon-staging.svg'
          pageTitle.textContent = 'Avoqado | Dashboard (STAGING)'
          document.documentElement.setAttribute('data-env', 'staging')
        } else {
          pageTitle.textContent = 'Avoqado | Dashboard'
          document.documentElement.setAttribute('data-env', 'production')
        }

        // Production (non-superadmin) shows the crisp vector logo; dev/staging + superadmin keep their badge.
        favicon.href = (isSuperadminRoute && (isLocal || isStaging)) ? '/favicon-superadmin.svg' : baseFaviconHref
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
