name: 🐛 Bug
description: Reportar algo roto. Entre más preciso, más rápido el fix.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: ¿Qué está mal?
      description: El comportamiento que ves — no la causa.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ¿Qué debería pasar?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Cómo reproducir
      description: Pasos exactos. Sin pasos claros, el bug no se puede arreglar con confianza.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severidad
      options:
        - "Crítico — bloquea pagos / pierde dinero / app caída"
        - "Alto — feature importante rota, sin workaround"
        - "Medio — molesto pero hay workaround"
        - "Bajo — cosmético"
    validations:
      required: true

  - type: input
    id: where
    attributes:
      label: ¿Dónde? (pantalla / venue / rol)
      placeholder: "ej. Mis Ventas · venue PlayTelecom · rol CASHIER"

  - type: textarea
    id: evidence
    attributes:
      label: Evidencia
      description: Screenshot, link de Crashlytics, link de betterstack, mensaje del cliente, versión de la app.
