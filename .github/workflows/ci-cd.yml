name: 🌐 Avoqado Dashboard CI/CD Pipeline (Optimized)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review] # Skip draft
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - demo
          - production

# Cancel outdated workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '20'
  # Shared VITE_ vars — same Firebase/Google project across all environments (public client-side keys)
  VITE_FIREBASE_API_KEY: 'AIzaSyDO_YD4EhiJVcmS-7O189B7J3j0cwPp1lQ'
  VITE_FIREBASE_AUTH_DOMAIN: 'avoqado-d0a24.firebaseapp.com'
  VITE_FIREBASE_RECAPTCHA_SITE_KEY: '6LcM7AcqAAAAADw4D1UBS38j30SXxn3OTl2jAqi3'
  VITE_GOOGLE_CLIENT_ID: '219752736783-r20hp7rn5aam58o5vn5qr7ij46pqhht8.apps.googleusercontent.com'
  VITE_STRIPE_PUBLISHABLE_KEY: 'pk_test_XCv57wYNRXqzP7A5exFgiw4d005M9XPM6X'

jobs:
  # 🧪 Quality Gate: Test, lint and build
  test-and-build:
    name: 🧪 Test, Lint & Build
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    outputs:
      version: ${{ steps.package-version.outputs.version }}
      build-time: ${{ steps.build-info.outputs.build-time }}
      build-size: ${{ steps.build-size.outputs.size }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ✅ OPTIMIZATION: Cache node_modules for 2-3 min savings
      - name: 📦 Cache node_modules
        uses: actions/cache@v5
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-

      - name: 📦 Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      # ✅ OPTIMIZATION: Only run linting on code changes
      - name: 📏 Run ESLint
        run: npm run lint

      - name: 🌐 Run i18n validation
        run: npm run lint:i18n

      - name: 🔍 TypeScript compilation check
        run: npx tsc --noEmit

      - name: 🔐 Run auth/routing regression suite
        timeout-minutes: 15
        run: npm run test:auth-routing -- --pool=forks --maxWorkers=1 --testTimeout=20000 --hookTimeout=20000

      - name: 🏗️ Build application (CI validation only)
        run: npm run build
        env:
          # CI validation build — not deployed. Each deploy job rebuilds with correct API URL.
          VITE_API_URL: 'https://api.avoqado.io'

      - name: 📊 Get package version
        id: package-version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: ⏰ Build info
        id: build-info
        run: echo "build-time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: 📐 Calculate build size
        id: build-size
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "📐 Build size: $SIZE"

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-build-${{ github.sha }}
          path: dist/
          retention-days: 7

  # 🧪 Deploy to Demo Environment
  deploy-demo:
    name: 🧪 Deploy to Demo
    needs: test-and-build
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'demo')
    environment:
      name: demo
      url: https://demo.dashboard.avoqado.io

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🏗️ Build for Demo
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://demo.api.avoqado.io' }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: 🚀 Deploy to Cloudflare Pages (Demo)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name demo-avoqado-web-dashboard --branch develop

      # ✅ OPTIMIZATION: Faster health check (non-blocking due to Cloudflare WAF)
      - name: 🏥 Demo health check
        continue-on-error: true
        run: |
          echo "🏥 Checking demo deployment..."
          echo "ℹ️ Note: Cloudflare WAF may block automated health checks"
          for i in {1..5}; do
            # Use -L to follow redirects, add user-agent to avoid bot detection
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L -A "GitHub-Actions-HealthCheck" https://demo.dashboard.avoqado.io)
            echo "⏳ Attempt $i/5... HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Demo deployment successful!"
              exit 0
            fi
            sleep 5
          done
          echo "⚠️ Demo health check inconclusive (Cloudflare WAF may be blocking)"
          echo "📍 Manual verification: https://demo.dashboard.avoqado.io"
          exit 0

  # 🏭 Deploy to Production Environment
  deploy-production:
    name: 🏭 Deploy to Production
    needs: test-and-build
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://dashboardv2.avoqado.io

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🏗️ Build for Production
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.avoqado.io' }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: 🏭 Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name avoqado-web-dashboard

      # ✅ OPTIMIZATION: Efficient production health check
      - name: 🏥 Production health verification
        run: |
          echo "🏥 Performing production health checks..."

          for i in {1..12}; do
            if curl -f -s -I https://dashboardv2.avoqado.io > /dev/null; then
              echo "✅ Production health check passed!"

              # Quick security header check
              HEADERS=$(curl -s -I https://dashboardv2.avoqado.io)
              echo "$HEADERS" | grep -qi "strict-transport-security" && echo "🔒 HSTS: ✅"
              echo "$HEADERS" | grep -qi "x-frame-options" && echo "🛡️ X-Frame-Options: ✅"

              echo "🎉 Production deployment successful!"
              exit 0
            fi
            echo "⏳ Attempt $i/12..."
            sleep 8
          done

          echo "❌ Production health check failed"
          exit 1

      - name: 📢 Production deployment summary
        if: success()
        run: |
          echo "🎉 ✅ 🏭 PRODUCTION DEPLOYMENT SUCCESSFUL! 🏭 ✅ 🎉"
          echo "🌐 URL: https://dashboardv2.avoqado.io"
          echo "📦 Version: ${{ needs.test-and-build.outputs.version }}"
          echo "📐 Build size: ${{ needs.test-and-build.outputs.build-size }}"
          echo "🚀 Commit: ${{ github.sha }}"

  # 👀 PR Preview and Quality Report
  deploy-preview:
    name: 👀 PR Preview & Quality Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    needs: test-and-build

    steps:
      - name: 💬 Enhanced PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const buildTime = '${{ needs.test-and-build.outputs.build-time }}';
            const version = '${{ needs.test-and-build.outputs.version }}';
            const buildSize = '${{ needs.test-and-build.outputs.build-size }}';

            const body = [
              '## 🌐 Build Successful! ✅',
              '',
              '### 📊 Build Summary',
              '- **Branch**: `' + pr.head.ref + '`',
              '- **Commit**: `' + context.sha.substring(0, 7) + '`',
              '- **Version**: `' + version + '`',
              '- **Build size**: `' + buildSize + '`',
              '- **Built at**: `' + buildTime + '`',
              '',
              '### ✅ Quality Checks',
              '- ESLint, i18n, TypeScript, Build all passed!',
              '',
              '🎯 **Ready for review!**'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
