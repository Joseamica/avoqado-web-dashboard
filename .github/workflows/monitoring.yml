name: 🌐 Frontend Monitoring & Performance (Optimized)

on:
  schedule:
    # ✅ OPTIMIZATION: Changed from every hour to every 6 hours (saves ~4,300 min/month!)
    - cron: '0 */6 * * *'  # Runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of check to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - production
          - staging
          - lighthouse

permissions:
  contents: read
  issues: write

env:
  PRODUCTION_URL: https://dashboard.avoqado.io
  STAGING_URL: https://staging.dashboard.avoqado.io

jobs:
  # 🌐 Frontend Health Check Production
  frontend-health-production:
    name: 🌐 Production Frontend Health
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'production'))

    steps:
      - name: 🔍 Production Frontend Health Check
        id: prod-frontend-health
        continue-on-error: true
        run: |
          echo "🔍 Checking production frontend..."
          echo "ℹ️ Note: Cloudflare WAF may block automated health checks"

          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}\nTIME:%{time_total}\nSIZE:%{size_download}" \
            -A "GitHub-Actions-HealthCheck" \
            -L -I \
            $PRODUCTION_URL 2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          LOAD_TIME=$(echo "$RESPONSE" | grep "TIME:" | cut -d: -f2)

          if [[ "$HTTP_CODE" =~ ^(200|301|302)$ ]]; then
            echo "✅ Production frontend healthy (HTTP $HTTP_CODE)"
            echo "⏱️ Load time: ${LOAD_TIME}s"
            echo "status=healthy" >> $GITHUB_OUTPUT

            if echo "$RESPONSE" | grep -qi "strict-transport-security"; then
              echo "🔒 Security headers: ✅"
            fi
          else
            echo "⚠️ Health check inconclusive (HTTP $HTTP_CODE — Cloudflare WAF may be blocking)"
            echo "📍 Manual verification: $PRODUCTION_URL"
            echo "status=inconclusive" >> $GITHUB_OUTPUT
          fi

      - name: 🚨 Production Alert
        if: failure()
        run: |
          echo "🚨 PRODUCTION FRONTEND DOWN!"
          echo "Time: $(date -u)"
          echo "Site: $PRODUCTION_URL"
          # In production, you'd send this to Slack/PagerDuty/etc.

  # 🧪 Frontend Health Check Staging
  frontend-health-staging:
    name: 🧪 Staging Frontend Health
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'staging'))

    steps:
      - name: 🔍 Staging Frontend Health Check
        run: |
          echo "🔍 Checking staging frontend..."

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $STAGING_URL)

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "✅ Staging frontend healthy"
          else
            echo "⚠️ Staging frontend has issues (HTTP $HTTP_CODE) - non-critical"
          fi

  # 🚀 Lighthouse Performance Audit
  lighthouse-audit:
    name: 🚀 Lighthouse Performance Audit
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'lighthouse'))

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ✅ OPTIMIZATION: Cache Lighthouse CLI globally
      - name: 📦 Cache Lighthouse CLI
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: lighthouse-cli-${{ runner.os }}

      - name: 📦 Install Lighthouse CI
        run: npm install -g @lhci/cli

      # ✅ OPTIMIZATION: Reduced from 3 runs to 1 (saves ~40 min/month)
      - name: 🚀 Run Lighthouse audit
        run: |
          echo "🚀 Running Lighthouse audit on production..."

          lhci autorun \
            --upload.target=temporary-public-storage \
            --collect.url=$PRODUCTION_URL \
            --collect.numberOfRuns=1 \
            --assert.assertions.categories:performance=0.7 \
            --assert.assertions.categories:accessibility=0.8 \
            --assert.assertions.categories:best-practices=0.8 \
            --assert.assertions.categories:seo=0.8 || echo "⚠️ Some Lighthouse checks failed"

      - name: 📊 Performance Summary
        run: |
          echo "📊 Lighthouse Performance Targets:"
          echo "  - Performance: ≥70"
          echo "  - Accessibility: ≥80"
          echo "  - Best Practices: ≥80"
          echo "  - SEO: ≥80"

  # 🔗 API Connectivity Check
  api-connectivity:
    name: 🔗 API Connectivity Check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.check_type == 'all')

    steps:
      - name: 🔗 Test frontend-to-backend connectivity
        run: |
          echo "🔗 Testing API connectivity..."

          API_URL="https://avoqado-server.onrender.com"

          # Quick API health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Origin: https://dashboard.avoqado.io" \
            $API_URL/health)

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "✅ Frontend can reach backend API"
          else
            echo "⚠️ API connectivity issue (HTTP $HTTP_CODE)"
          fi

  # 📊 Generate Health Report
  health-report:
    name: 📊 Health Report
    runs-on: ubuntu-latest
    needs: [frontend-health-production, frontend-health-staging, api-connectivity]
    if: always() && github.event_name == 'workflow_dispatch'

    steps:
      - name: 📊 Generate health report
        run: |
          echo "# 🌐 Avoqado Frontend Health Report"
          echo "Generated at: $(date -u)"
          echo ""

          echo "## Status Summary"
          echo "- Production: ${{ needs.frontend-health-production.result }}"
          echo "- Staging: ${{ needs.frontend-health-staging.result }}"
          echo "- API: ${{ needs.api-connectivity.result }}"
          echo ""

          echo "## Monitored URLs"
          echo "- Production: https://dashboard.avoqado.io"
          echo "- Staging: https://staging.dashboard.avoqado.io"
          echo "- API: https://avoqado-server.onrender.com"
